stages:
  - lint

phpcs_moodle:
  stage: lint
  image: composer:2
  variables:
    COMPOSER_ALLOW_SUPERUSER: "1"
  before_script:
    - |
      cat > composer.json <<'JSON'
      {
        "name": "local/tiny-fileimport-ci",
        "require-dev": {
          "moodlehq/moodle-cs": "^3.7"
        },
        "config": {
          "allow-plugins": {
            "dealerdirect/phpcodesniffer-composer-installer": true
          }
        }
      }
      JSON
    - composer install --no-interaction --no-progress
  script:
    - vendor/bin/phpcs --standard=Moodle --extensions=php --ignore=vendor/* .
